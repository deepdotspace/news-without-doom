name = "news"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "worker.ts"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws/*", "/internal/*", "/v1/*", "/_deepspace/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AppRecordRoom", "AppYjsRoom", "AppCanvasRoom", "AppMediaRoom", "AppPresenceRoom"]

[[migrations]]
tag = "v2"
deleted_classes = ["AppMediaRoom"]
new_sqlite_classes = ["AppCronRoom"]

[durable_objects]
bindings = [
  { name = "RECORD_ROOMS", class_name = "AppRecordRoom" },
  { name = "YJS_ROOMS", class_name = "AppYjsRoom" },
  { name = "CANVAS_ROOMS", class_name = "AppCanvasRoom" },
  { name = "PRESENCE_ROOMS", class_name = "AppPresenceRoom" },
  { name = "CRON_ROOMS", class_name = "AppCronRoom" },
]

# Deploy subdomain is `name = "news"` (→ news.app.space), but the app's data
# scope stays "news-without-doom" to match src/constants.ts SCOPE_ID and the
# existing RecordRoom data created under app:news-without-doom. Do not change
# this to "news" without migrating that data.
[vars]
APP_NAME = "news-without-doom"

[dev]
port = 8780
inspector_port = 9237

# Secrets (set via `wrangler secret put` or written by `deepspace dev`):
#   AUTH_JWT_PUBLIC_KEY
#   AUTH_JWT_ISSUER
#   AUTH_WORKER_URL
#   OWNER_USER_ID
#   INTERNAL_STORAGE_HMAC_SECRET
